<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="Local-first diet planning, macro tracking, grocery, meal prep, and health-progress PWA." />
  <title>Diet Planner</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <script>
    (() => {
      try {
        const theme = localStorage.getItem('dietPlanner.theme') || 'system';
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const resolved = theme === 'system' ? (prefersDark ? 'dark' : 'light') : theme;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.themePreference = theme;
        const lang = localStorage.getItem('dietPlanner.language');
        if (lang === 'en' || lang === 'it') document.documentElement.lang = lang;
      } catch {}
    })();
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="desktop-nav" aria-label="Desktop navigation">
      <div class="brand">
        <img src="assets/icon.svg" alt="" />
        <div>
          <strong>Diet Planner</strong>
          <span id="brandSubtitle">Private local MVP</span>
        </div>
      </div>
      <nav id="desktopNav"></nav>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <p class="eyebrow">Diet Planner</p>
          <h1 id="pageTitle">Today</h1>
        </div>
        <button class="ghost-button" id="installButton" hidden>Install app</button>
      </header>
      <section id="app" class="view-root" aria-live="polite"></section>
    </main>
  </div>

  <nav class="mobile-nav" id="mobileNav" aria-label="Mobile navigation"></nav>

  <div id="modal" class="modal-backdrop" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 id="modalTitle">Dialog</h2>
        <button class="icon-button" id="modalClose" aria-label="Close dialog">×</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <template id="toastTemplate">
    <div class="toast" role="status"></div>
  </template>
  <div id="toastStack" class="toast-stack"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
